<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录注册 - 酸枣枝制膜平台</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            background: var(--color-bg);
            position: relative;
            overflow: hidden;
        }

        .auth-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .auth-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(74, 124, 40, 0.08) 0%, transparent 50%);
        }

        .auth-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            position: relative;
            z-index: 1;
        }

        .auth-brand {
            text-align: center;
            margin-bottom: 48px;
        }

        .auth-brand .logo-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #2d5016, #4a7c28);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
        }

        .auth-brand h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .auth-brand h1 span {
            font-weight: 600;
        }

        .auth-brand p {
            font-size: 0.95rem;
            color: var(--color-text-secondary);
        }

        .auth-features {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 320px;
        }

        .auth-feature {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .auth-feature-icon {
            width: 40px;
            height: 40px;
            background: #f0f7e6;
            border: 1px solid rgba(74, 124, 40, 0.2);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: #4a7c28;
            flex-shrink: 0;
        }

        .auth-feature-text h4 {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .auth-feature-text p {
            font-size: 0.8rem;
            color: var(--color-text-muted);
        }

        .auth-right {
            width: 480px;
            background: var(--color-bg-elevated);
            border-left: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            position: relative;
            z-index: 1;
        }

        .auth-container {
            width: 100%;
            max-width: 360px;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 32px;
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            padding: 4px;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--color-text-secondary);
            border-radius: 4px;
            transition: var(--transition);
        }

        .auth-tab.active {
            background: var(--color-bg);
            color: var(--color-text-primary);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .auth-form h2 {
            font-size: 1.5rem;
            font-weight: 300;
            margin-bottom: 8px;
        }

        .auth-form .subtitle {
            font-size: 0.9rem;
            color: var(--color-text-secondary);
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--color-text-secondary);
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-text-muted);
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px 14px 12px 40px;
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            color: var(--color-text-primary);
            transition: var(--transition);
        }

        .input-group input:focus {
            outline: none;
            border-color: #4a7c28;
            box-shadow: 0 0 0 3px rgba(74, 124, 40, 0.1);
        }

        .input-group input::placeholder {
            color: var(--color-text-muted);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--color-accent);
        }

        .remember-me label {
            font-size: 0.85rem;
            color: var(--color-text-secondary);
        }

        .forgot-password {
            font-size: 0.85rem;
            color: #4a7c28;
            text-decoration: none;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--color-text-primary);
            color: var(--color-bg);
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-submit:hover {
            background: #e0e0e0;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: var(--color-text-muted);
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--color-border);
        }

        .divider span {
            padding: 0 16px;
            font-size: 0.85rem;
        }

        .social-login {
            display: flex;
            gap: 12px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--color-text-secondary);
        }

        .social-btn:hover {
            border-color: var(--color-border-hover);
        }

        .social-btn.wechat {
            color: #07c160;
        }

        .social-btn.qq {
            color: #12b7f5;
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--color-text-secondary);
        }

        .auth-footer a {
            color: #4a7c28;
            text-decoration: none;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .user-type-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .user-type-option {
            flex: 1;
            padding: 16px;
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
        }

        .user-type-option:hover {
            border-color: var(--color-border-hover);
        }

        .user-type-option.selected {
            border-color: #4a7c28;
            background: #f0f7e6;
        }

        .user-type-option i {
            font-size: 1.5rem;
            color: #4a7c28;
            margin-bottom: 8px;
        }

        .user-type-option h4 {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .user-type-option p {
            font-size: 0.8rem;
            color: var(--color-text-muted);
        }

        @media (max-width: 992px) {
            .auth-left {
                display: none;
            }

            .auth-right {
                width: 100%;
                min-height: 100vh;
                border-left: none;
            }
        }

        @media (max-width: 480px) {
            .auth-right {
                padding: 40px 24px;
            }

            .user-type-selector {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-bg"></div>

        <div class="auth-left">
            <div class="auth-brand">
                <div class="logo-icon"><i class="fas fa-leaf"></i></div>
                <h1>酸枣枝<span>制膜平台</span></h1>
                <p>变废为宝，让废弃酸枣枝焕发新生</p>
            </div>
            <div class="auth-features">
                <div class="auth-feature">
                    <div class="auth-feature-icon"><i class="fas fa-handshake"></i></div>
                    <div class="auth-feature-text">
                        <h4>精准对接</h4>
                        <p>打破农户与企业之间的沟通壁垒</p>
                    </div>
                </div>
                <div class="auth-feature">
                    <div class="auth-feature-icon"><i class="fas fa-balance-scale"></i></div>
                    <div class="auth-feature-text">
                        <h4>透明定价</h4>
                        <p>建立标准化价格体系，公平交易</p>
                    </div>
                </div>
                <div class="auth-feature">
                    <div class="auth-feature-icon"><i class="fas fa-recycle"></i></div>
                    <div class="auth-feature-text">
                        <h4>绿色环保</h4>
                        <p>废弃资源再生，助力可持续发展</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="auth-right">
            <div class="auth-container">
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">登录</button>
                    <button class="auth-tab" data-tab="register">注册</button>
                </div>

                <form class="auth-form active" id="login-form">
                    <h2>欢迎回来</h2>
                    <p class="subtitle">登录您的账户继续使用平台服务</p>

                    <div class="form-group">
                        <label>手机号码</label>
                        <div class="input-group">
                            <i class="fas fa-phone"></i>
                            <input type="tel" placeholder="请输入手机号码" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>登录密码</label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" placeholder="请输入密码" required>
                        </div>
                    </div>

                    <div class="form-options">
                        <div class="remember-me">
                            <input type="checkbox" id="remember">
                            <label for="remember">记住我</label>
                        </div>
                        <a href="#" class="forgot-password">忘记密码？</a>
                    </div>

                    <button type="submit" class="btn-submit">登录</button>

                    <div class="divider"><span>其他登录方式</span></div>

                    <div class="social-login">
                        <button type="button" class="social-btn wechat">
                            <i class="fab fa-weixin"></i>微信登录
                        </button>
                        <button type="button" class="social-btn qq">
                            <i class="fab fa-qq"></i>QQ登录
                        </button>
                    </div>
                </form>

                <form class="auth-form" id="register-form">
                    <h2>创建账户</h2>
                    <p class="subtitle">注册成为平台用户，开始交易之旅</p>

                    <div class="user-type-selector">
                        <div class="user-type-option selected" data-type="farmer">
                            <i class="fas fa-user-tie"></i>
                            <h4>农户</h4>
                            <p>我有酸枣枝要卖</p>
                        </div>
                        <div class="user-type-option" data-type="enterprise">
                            <i class="fas fa-building"></i>
                            <h4>企业</h4>
                            <p>我要采购酸枣枝</p>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>手机号码</label>
                        <div class="input-group">
                            <i class="fas fa-phone"></i>
                            <input type="tel" placeholder="请输入手机号码" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>验证码</label>
                        <div class="input-group" style="display: flex; gap: 12px;">
                            <input type="text" placeholder="请输入验证码" required style="flex: 1;">
                            <button type="button" class="btn-outline" style="white-space: nowrap; padding: 12px 16px; font-size: 0.85rem;">获取验证码</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>设置密码</label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" placeholder="请设置6-20位密码" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>确认密码</label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" placeholder="请再次输入密码" required>
                        </div>
                    </div>

                    <div class="form-group" id="farmer-fields">
                        <label>所在地区</label>
                        <div class="input-group">
                            <i class="fas fa-map-marker-alt"></i>
                            <input type="text" placeholder="请输入您的所在地区，如：邢台市信都区">
                        </div>
                    </div>

                    <div class="form-group" id="enterprise-fields" style="display: none;">
                        <label>企业名称</label>
                        <div class="input-group">
                            <i class="fas fa-building"></i>
                            <input type="text" placeholder="请输入企业名称">
                        </div>
                    </div>

                    <div class="form-options">
                        <div class="remember-me">
                            <input type="checkbox" id="agree" required>
                            <label for="agree">我已阅读并同意 <a href="#" style="color: #4a7c28;">服务协议</a></label>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">注册</button>

                    <div class="auth-footer">
                        已有账户？<a href="#" onclick="switchTab('login')">立即登录</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                const tabId = this.getAttribute('data-tab');
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
                document.getElementById(`${tabId}-form`).classList.add('active');
            });
        });

        document.querySelectorAll('.user-type-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.user-type-option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
                const type = this.getAttribute('data-type');
                document.getElementById('farmer-fields').style.display = type === 'farmer' ? 'block' : 'none';
                document.getElementById('enterprise-fields').style.display = type === 'enterprise' ? 'block' : 'none';
            });
        });

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('登录成功！正在跳转到首页...');
            window.location.href = 'index.html';
        });

        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('注册成功！正在跳转到首页...');
            window.location.href = 'index.html';
        });

        function switchTab(tabId) {
            document.querySelectorAll('.auth-tab').forEach(tab => {
                if (tab.getAttribute('data-tab') === tabId) tab.click();
            });
        }
    </script>
</body>
</html>
